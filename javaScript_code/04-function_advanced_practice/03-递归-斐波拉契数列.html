        function fib(n) {
            let [a,b,c] = [1,1,2]
            for(let i = 4;i <= n;i++){
                a = b
                b = c
                c = a+b
            }
            return c
        }

        alert(fib(3)); // 2
        alert(fib(7)); // 13
        alert(fib(77)); // 5527939700884757
    </script>
