<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function sum(a) {
            let cursum = a
            function f(b) {
                cursum += b
                return f
            }

            f.toString = function(){
                return cursum
            }

            return f
        }



        alert(sum(1)(2) == 3); // 1 + 2
        alert(sum(1)(2)(3) == 6); // 1 + 2 + 3
        alert(sum(5)(-1)(2) == 6)
        alert(sum(6)(-1)(-2)(-3) == 0)
        alert(sum(0)(1)(2)(3)(4)(5) == 15)
    </script>
</body>
</html>
