<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function formatDate(date) {
            let now = new Date()
            let dif = now - date
            if (dif < 1000){
                return "right now"
            }
            
            let sec = Math.floor(dif / 1000)
            if(sec < 60){
                return `${sec} sec. ago`
            }

            let min = Math.floor(dif / 60000)
            if(min < 60){
                return `${min} min. ago`
            }

            let d = [
                '0' + now.getDate(),
                '0' + (now.getMonth() + 1),
                '' + now.getFullYear(),
                '0' + now.getHours(),
                '0' + now.getMinutes()
            ].map(component => component.slice(-2)) //每一个组件的后两位

            return d.slice(0,3).join('.') + ' ' + d.slice(-2).join(':')
        }

        alert( formatDate(new Date(new Date - 1)) ); // "right now"

        alert( formatDate(new Date(new Date - 30 * 1000)) ); // "30 sec. ago"

        alert( formatDate(new Date(new Date - 5 * 60 * 1000)) ); // "5 min. ago"

        // 昨天的日期，例如 31.12.16 20:00
        alert( formatDate(new Date(new Date - 86400 * 1000)) );
    </script>
</body>
</html>
