<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        //熟练，使用和掌握this
        let caculator = {
        read() {
            this.a = +prompt("input a",0)
            this.b = +prompt("input b",0)
        },

        sum() {
            return this.a + this.b
            },

        mul() {
            return this.a * this.b
            }
        }

        caculator.read()
        alert(caculator.sum())
        alert(caculator.mul())
    </script>
</body>
</html>
